version: '3.7'
services:
  grafana:
    image: grafana/grafana-enterprise:${GR_VERSION:-12.3.0}
    # image: grafana/grafana-enterprise:latest
    ports:
      - '3000:3000'
    volumes:
      # Mount only the built plugin (yarn build + mage), not the repo root: the root
      # also contains src/plugin.json, and two plugin.json files with the same id
      # confuse Grafana's plugin scanner.
      - ./dist:/var/lib/grafana/plugins/questdb-questdb-datasource
      - ./provisioning:/etc/grafana/provisioning
    environment:
      - TERM=linux
      - GF_DEFAULT_APP_MODE=development
      - GF_ENTERPRISE_LICENSE_TEXT=$GF_ENTERPRISE_LICENSE_TEXT
      # Threaded into the provisioned datasource (see provisioning/datasources);
      # set to "true" when running a QuestDB older than 8.3.0.
      - QDB_DISABLE_PREPARED_STATEMENTS=${QDB_DISABLE_PREPARED_STATEMENTS:-}
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:3000/api/health || exit 1']
      interval: 2s
      timeout: 5s
      retries: 30
    networks:
      - grafana

  questdb:
    image: 'questdb/questdb:${QDB_VERSION:-9.4.2}'
    container_name: 'grafana-questdb-server'
    ports:
      - '8812:8812'
      - '9000:9000'
    healthcheck:
      # The image ships no curl/wget; probe the PG-wire port with bash instead.
      test: ['CMD-SHELL', "bash -c 'exec 3<>/dev/tcp/127.0.0.1/8812'"]
      interval: 2s
      timeout: 5s
      retries: 30
    ulimits:
      nofile:
        soft: 262144
        hard: 262144
    networks:
      - grafana

networks:
  grafana:
